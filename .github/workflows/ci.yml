# Linux build + test CI for ivtools.
#
# Builds the tree with g++ on Ubuntu (the macOS dev builds use clang, so this
# is also where g++-only warnings -- -Wvla, -Wreorder, -Wsign-compare, ... --
# surface), then runs the three self-hosted test suites:
#   1. comterp_  unit tests   (headless, pure interpreter)
#   2. comdraw   graphical-scripting tests (needs an X server -> xvfb)
#   3. drawserv_ integration tests via drawmo (needs X server + TCP ports + ACE)
#
# comterp can build without ACE (the dependency is #ifdef HAVE_ACE-gated), but
# networking is elemental to ivtools now and the drawserv suite needs it, so we
# build WITH ACE here -- Debian's libace-dev for now (issue #147 tracks an
# in-tree "ACE-lite" shim that would stay behind the same HAVE_ACE switch).
name: CI

on:
  # Only master on push; feature branches get CI via the pull_request event.
  # Running push on every branch *and* pull_request would fire two runs on the
  # same PR commit -- and cancelling one (below) would leave a cancelled check on
  # the PR head that branch protection counts against the merge.  pull_request
  # also covers fork PRs (push events don't fire for forks), so nothing is lost.
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:   # allow manual runs from the Actions tab

# A new commit to the same PR (or to master) cancels the previous in-flight run
# instead of letting it grind to completion (the build alone is several minutes).
# Because push and pull_request no longer overlap on one commit, this only ever
# supersedes an older commit's run -- never a live sibling of the head commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build & test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf \
            xutils-dev libx11-dev libxext-dev \
            uuid-dev libace-dev \
            xvfb lsof groff gdb netcat-openbsd

      # ACE-lite (issue #147) standalone unit tests: self-contained g++ builds of
      # the in-tree ACE subset (value/socket types, the select reactor, and the
      # acceptor/svc_handler accept-and-spawn + EOF lifecycle), independent of the
      # imake tree build and of libACE. A fast gate that runs before the heavy
      # build; each test program exits nonzero on failure, so `set -e` fails here.
      - name: Test - ACE-lite standalone units
        run: |
          set -e
          for t in sock_loopback reactor_loop acceptor_spawn log_fmt; do
            echo "=== ACE-lite: $t ==="
            g++ -std=c++14 -Wall -I src -I src/include \
              src/ACE-lite/reactor.c src/ACE-lite/event_handler.c \
              src/ACE-lite/sock.c src/ACE-lite/log_msg.c \
              "src/ACE-lite/tests/$t.cc" -o "$RUNNER_TEMP/acelite_$t"
            "$RUNNER_TEMP/acelite_$t"
          done

      - name: Generate ./configure
        run: autoreconf -i

      - name: Configure (with ACE)
        run: |
          ./configure \
            --with-ace=/usr/include \
            --with-ace-libs=/usr/lib/x86_64-linux-gnu

      # imake settles its generated Makefiles over a couple of passes; mirror
      # the ARCHBUILD.sh recipe (make / make Makefiles / make) so a cold tree
      # builds deterministically. The build log is captured for warning triage.
      - name: Build
        run: |
          set -o pipefail
          make 2>&1 | tee build-1.log
          make Makefiles
          make 2>&1 | tee build.log

      - name: Warning summary (g++)
        if: always()
        run: |
          echo "### g++ build warnings" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -hE 'warning:' build.log | grep -oE '\[-W[a-z0-9-]+\]' \
            | sort | uniq -c | sort -rn >> "$GITHUB_STEP_SUMMARY" || echo "(none)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "total: $(grep -cE 'warning:' build.log) warning lines" >> "$GITHUB_STEP_SUMMARY"

      # imake's recursive `make` keeps going past a failed subdirectory and
      # still exits 0, so a broken compile can leave the Build step green.
      # Gate on the actual program binaries existing (each lands as LINUX/a.out
      # in its program dir, renamed to the program name only at install time).
      - name: Verify program binaries built
        run: |
          missing=0
          for p in comterp_ comdraw drawserv_; do
            if [ ! -x "src/$p/LINUX/a.out" ]; then
              echo "::error::$p failed to build (src/$p/LINUX/a.out missing)"
              missing=1
            fi
          done
          [ "$missing" = 0 ] || { echo "build incomplete -- see build.log"; exit 1; }

      # Put the freshly built binaries on PATH for the test suites. Binaries
      # land in per-CPU subdirs (LINUX/) under each program directory; installing
      # is the simplest way to satisfy drawmo's "binaries on PATH" requirement.
      - name: Install binaries
        run: |
          sudo make install
          sudo ldconfig   # refresh linker cache so /usr/local/lib *.so are found at runtime

      - name: Test - comterp unit suite
        timeout-minutes: 3   # safety net: fail fast if the interpreter hangs
        run: |
          set -o pipefail
          cd src/comterp_/tests
          # `comterp run <file>` seeds the relative-path base and exits cleanly.
          # (An earlier stdin-EOF teardown segfault in the piped REPL form
          # `echo ... | comterp` no longer reproduces on x86_64 -- verified bare
          # and under a core dump -- but `run` stays as the deterministic form.)
          comterp run run_all.comt 2>&1 | tee run.log
          # the suite prints "FAIL: <name>" per failure and "run_all: true" on full pass
          if grep -q '^FAIL' run.log || ! grep -q 'run_all: true' run.log; then
            echo "comterp suite FAILED"; exit 1
          fi

      # Wire-protocol test: ivtools' defining idea is that the command language IS
      # the wire protocol, so this exercises a `comterp server` over a real
      # loopback TCP socket -- no X, no drawserv, fully deterministic. A fast,
      # focused check of the protocol on its own, ahead of the heavier full drawmo
      # distributed suite below.
      - name: Test - comterp networking (wire protocol over TCP)
        timeout-minutes: 2
        run: sh src/comterp_/tests/remote_loopback.sh

      # The comdraw/drawserv startup seed `update(1000000)` use-after-free is
      # FIXED: the inline-eval ComTerpServ::run() overloads now hold the
      # running() bracket, so a reactor close (e.g. stdin EOF) firing inside
      # update()'s handle_events() makes ComterpHandler::destroy() defer via
      # delete_later() instead of freeing the live interpreter out from under the
      # eval loop (see src/ComTerp/comterpserv.c). comdraw runs the full suite and
      # blocks CI again.
      - name: Test - comdraw graphical-scripting suite
        if: always()
        timeout-minutes: 4
        run: |
          set -o pipefail   # don't let `| tee` mask a missing/crashing comdraw
          cd src/comdraw/tests
          # comdraw is a GUI app that would otherwise drop into its event loop and
          # never return; -runexpr "...;exit" runs the suite then exits cleanly.
          xvfb-run -a comdraw -runexpr 'run("./run_all.comt");exit' 2>&1 | tee run.log
          if grep -q '^FAIL' run.log; then echo "comdraw suite FAILED"; exit 1; fi

      # drawserv startup smoke: with the UAF fixed, drawserv must build, map under
      # X, and run an expression without the seed-update crash. This is a single
      # process with no cross-process callback, so it's deterministic under xvfb
      # and BLOCKS CI.
      - name: Test - drawserv startup smoke
        if: always()
        timeout-minutes: 2
        run: |
          set -o pipefail
          xvfb-run -a drawserv -stdin_off -runexpr 'print("DRAWSERV-ALIVE\n");exit' 2>&1 | tee ds.log
          grep -q 'DRAWSERV-ALIVE' ds.log || { echo "drawserv failed to start"; exit 1; }

      # Full drawmo distributed suite -- now runs headless under xvfb and BLOCKS.
      # It was thought to need real X, but the real blocker was networking, not the
      # GUI: drawmo dialed "localhost", which on this runner resolves to IPv6 ::1
      # first, while the comterp/drawserv acceptors bind IPv4 only -- so every
      # callback hit ECONNREFUSED and the child appeared to "never call back."
      # drawmo now uses 127.0.0.1 literals (no resolver in the path), so the child
      # drawserv it spawns under xvfb maps its window and calls back over IPv4
      # loopback exactly as it does on a real display. (The deeper fix -- accept
      # IPv6 on the listener side -- is ACE-build-dependent and rides with the
      # in-tree ACE-lite, issue #147.)
      - name: Test - drawserv drawmo full suite
        if: always()
        timeout-minutes: 6
        run: |
          set -o pipefail
          cd src/drawserv_/tests
          # drawmo exits 0 on full pass, 1 on any failure (the comterp_listen
          # wrapper now propagates that status).  Belt-and-suspenders: also grep
          # the log for ': FAIL' like the comdraw suite, so a regression anywhere
          # in the xvfb-run -> wrapper -> comterp exit-code chain can't fake green.
          xvfb-run -a ./drawmo < /dev/null 2>&1 | tee drawmo.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ] || grep -q ': FAIL' drawmo.log; then
            echo "drawmo suite FAILED (rc=$rc)"; exit 1
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
